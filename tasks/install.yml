---
- name: Ensure Calibre-Web paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ calibre_web_uid }}"
    group: "{{ calibre_web_gid }}"
  with_items:
    - "{{ calibre_web_base_path }}"
    - "{{ calibre_web_config_path }}"
    - "{{ calibre_web_books_path }}"

- name: Ensure Calibre-Web support files installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ calibre_web_base_path }}/{{ item }}"
    mode: "0640"
    owner: "{{ calibre_web_uid }}"
    group: "{{ calibre_web_gid }}"
  with_items:
    - env
    - labels
  register: calibre_web_support_files_result

- name: Run if self-building of Calibre-Web container image is not enabled
  when: "not calibre_web_container_image_self_build | bool"
  block:
    - name: Ensure Calibre-Web container image is pulled via community.docker.docker_image_pull
      when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
      community.docker.docker_image_pull:
        name: "{{ calibre_web_container_image }}"
        pull: always
      register: calibre_web_container_image_pull_result_ansible_module
      retries: "{{ devture_playbook_help_container_retries_count }}"
      delay: "{{ devture_playbook_help_container_retries_delay }}"
      until: calibre_web_container_image_pull_result_ansible_module is not failed

    - name: Ensure Calibre-Web container image is pulled via ansible.builtin.command
      when: devture_systemd_docker_base_container_image_pull_method == 'command'
      ansible.builtin.command:
        cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ calibre_web_container_image }}"
      register: calibre_web_container_image_pull_result_command
      retries: "{{ devture_playbook_help_container_retries_count }}"
      delay: "{{ devture_playbook_help_container_retries_delay }}"
      until: calibre_web_container_image_pull_result_command is not failed
      changed_when: "'Downloaded newer image' in calibre_web_container_image_pull_result_command.stdout"

- name: Run if self-building of Calibre-Web container image is enabled
  when: "calibre_web_container_image_self_build | bool"
  block:
    - name: Ensure Calibre-Web repository is present on self-build
      ansible.builtin.git:
        repo: "{{ calibre_web_container_image_self_build_repo }}"
        version: "{{ calibre_web_container_image_self_build_repo_version }}"
        dest: "{{ calibre_web_container_image_self_build_src_files_path }}"
        force: "yes"
      register: calibre_web_git_pull_results

    - name: Ensure Calibre-Web container image is built
      community.docker.docker_image_build:
        name: "{{ calibre_web_container_image_self_build_name }}"
        dockerfile: Dockerfile
        path: "{{ calibre_web_container_image_self_build_src_files_path }}"
        pull: true
        rebuild: "{{ 'always' if calibre_web_git_pull_results.changed | bool else 'never' }}"
      register: calibre_web_container_image_build_result

- name: Ensure Calibre-Web container network is created via community.docker.docker_network
  when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
  community.docker.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ calibre_web_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"
  register: calibre_web_network_creation_result

- name: Ensure Calibre-Web container network is created via ansible.builtin.command
  when: devture_systemd_docker_base_container_network_creation_method == 'command'
  ansible.builtin.command:
    cmd: >-
      {{ devture_systemd_docker_base_host_command_docker }} network create
      {% if devture_systemd_docker_base_ipv6_enabled %}--ipv6{% endif %}
      {{ devture_systemd_docker_base_container_networks_driver_options_string }}
      {{ calibre_web_container_network }}
  register: calibre_web_network_creation_result
  changed_when: calibre_web_network_creation_result.rc == 0
  failed_when: calibre_web_network_creation_result.rc != 0 and 'already exists' not in calibre_web_network_creation_result.stderr

- name: Ensure Calibre-Web systemd service is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/calibre-web.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ calibre_web_identifier }}.service"
    mode: "0644"
  register: calibre_web_systemd_service_result

- name: Determine whether Calibre-Web needs a restart
  ansible.builtin.set_fact:
    calibre_web_restart_necessary: >-
      {{
        calibre_web_support_files_result.changed | default(false)
        or calibre_web_systemd_service_result.changed | default(false)
        or calibre_web_container_image_pull_result_ansible_module.changed | default(false)
        or calibre_web_container_image_pull_result_command.changed | default(false)
        or calibre_web_container_image_build_result.changed | default(false)
      }}
