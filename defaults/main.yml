---
# Project source code URL: https://github.com/janeczku/calibre-web

calibre_web_enabled: true

calibre_web_identifier: calibre-web
calibre_web_base_path: "/{{ calibre_web_identifier }}"
calibre_web_config_path: "{{ calibre_web_base_path }}/config"
calibre_web_books_path: "{{ calibre_web_base_path }}/books"

# renovate: datasource=docker depName=linuxserver/calibre-web
calibre_web_version: 0.6.26

calibre_web_uid: ""
calibre_web_gid: ""

# The scheme used for serving Calibre-Web.
calibre_web_scheme: https

# The hostname at which Calibre-Web is served.
calibre_web_hostname: ""

# The path at which Calibre-Web is served.
# This value must either be `/` or not end with a slash (e.g. `/calibre-web`).
calibre_web_path_prefix: /

calibre_web_container_image: "{{ calibre_web_container_image_registry_prefix }}linuxserver/calibre-web:{{ calibre_web_container_image_tag }}"
calibre_web_container_image_tag: "{{ calibre_web_version }}"
calibre_web_container_image_registry_prefix: "{{ calibre_web_container_image_registry_prefix_upstream }}"
calibre_web_container_image_registry_prefix_upstream: "{{ calibre_web_container_image_registry_prefix_upstream_default }}"
calibre_web_container_image_registry_prefix_upstream_default: docker.io/
calibre_web_container_image_force_pull: "{{ calibre_web_container_image.endswith(':latest') }}"

calibre_web_container_image_self_build: false
calibre_web_container_image_self_build_name: "linuxserver/calibre-web:{{ calibre_web_container_image_self_build_repo_version }}"
calibre_web_container_image_self_build_repo: "https://github.com/linuxserver/docker-calibre-web.git"
calibre_web_container_image_self_build_repo_version: "master"
calibre_web_container_image_self_build_src_files_path: "{{ calibre_web_base_path }}/docker-src"

# The base container network. It will be auto-created by this role if it doesn't exist already.
calibre_web_container_network: "{{ calibre_web_identifier }}"

# Control if the container network is deleted on uninstalling.
calibre_web_container_network_deletion_enabled: true

# Specify how the container publishes its HTTP port (as defined by `calibre_web_container_http_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
calibre_web_container_http_host_bind_port: ""

# The port number in the container
calibre_web_container_http_port: 8083

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to another reverse proxy, which runs in a different container network.
calibre_web_container_additional_networks: "{{ calibre_web_container_additional_networks_auto + calibre_web_container_additional_networks_custom }}"
calibre_web_container_additional_networks_auto: []
calibre_web_container_additional_networks_custom: []

# A list of additional "volumes" to mount in the container.
# This list gets populated dynamically at runtime. You can provide a different default value,
# if you wish to mount your own files into the container.
# Contains definition objects like this: `{"type": "bind", "src": "/outside", "dst": "/inside", "options": "readonly"}.
# See the `--mount` documentation for the `docker run` command.
calibre_web_container_additional_volumes: "{{ calibre_web_container_additional_volumes_auto + calibre_web_container_additional_volumes_custom }}"
calibre_web_container_additional_volumes_auto: []
calibre_web_container_additional_volumes_custom: []

# calibre_web_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `calibre_web_container_labels_additional_labels_custom`.
calibre_web_container_labels_traefik_enabled: true
calibre_web_container_labels_traefik_docker_network: "{{ calibre_web_container_network }}"
calibre_web_container_labels_traefik_hostname: "{{ calibre_web_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/calibre-web`).
calibre_web_container_labels_traefik_path_prefix: "{{ calibre_web_path_prefix }}"
calibre_web_container_labels_traefik_rule: "Host(`{{ calibre_web_container_labels_traefik_hostname }}`){% if calibre_web_container_labels_traefik_path_prefix != '/' %} && PathPrefix(`{{ calibre_web_container_labels_traefik_path_prefix }}`){% endif %}"
calibre_web_container_labels_traefik_priority: 0
calibre_web_container_labels_traefik_entrypoints: web-secure
calibre_web_container_labels_traefik_tls: "{{ calibre_web_container_labels_traefik_entrypoints != 'web' }}"
calibre_web_container_labels_traefik_tls_certResolver: default  # noqa var-naming
calibre_web_container_labels_traefik_middleware_basic_auth_enabled: false
# See: https://doc.traefik.io/traefik/reference/routing-configuration/http/middlewares/basicauth/
calibre_web_container_labels_traefik_middleware_basic_auth_users: ""

# Controls whether a compression middleware will be injected into the middlewares list.
# This compression middleware is supposed to be defined elsewhere (using labels or a File provider, etc.) and is merely referenced by this router.
calibre_web_container_labels_traefik_compression_middleware_enabled: false
calibre_web_container_labels_traefik_compression_middleware_name: ""

# Controls which additional headers to attach to all HTTP requests.
# To add your own custom request headers, use `calibre_web_container_labels_traefik_additional_request_headers_custom`
calibre_web_container_labels_traefik_additional_request_headers: "{{ calibre_web_container_labels_traefik_additional_request_headers_auto | combine(calibre_web_container_labels_traefik_additional_request_headers_custom) }}"
calibre_web_container_labels_traefik_additional_request_headers_auto: {}
calibre_web_container_labels_traefik_additional_request_headers_custom: {}

# Controls which additional headers to attach to all HTTP responses.
# To add your own custom response headers, use `calibre_web_container_labels_traefik_additional_response_headers_custom`
calibre_web_container_labels_traefik_additional_response_headers: "{{ calibre_web_container_labels_traefik_additional_response_headers_auto | combine(calibre_web_container_labels_traefik_additional_response_headers_custom) }}"
calibre_web_container_labels_traefik_additional_response_headers_auto: |
  {{
    {}
    | combine ({'X-XSS-Protection': calibre_web_http_header_xss_protection} if calibre_web_http_header_xss_protection else {})
    | combine ({'X-Content-Type-Options': calibre_web_http_header_content_type_options} if calibre_web_http_header_content_type_options else {})
    | combine ({'Content-Security-Policy': calibre_web_http_header_content_security_policy} if calibre_web_http_header_content_security_policy else {})
    | combine ({'Permissions-Policy': calibre_web_http_header_permissions_policy} if calibre_web_http_header_permissions_policy else {})
    | combine ({'Strict-Transport-Security': calibre_web_http_header_strict_transport_security} if calibre_web_http_header_strict_transport_security and calibre_web_container_labels_traefik_tls else {})
  }}
calibre_web_container_labels_traefik_additional_response_headers_custom: {'X-Clacks-Overhead': GNU Terry Pratchett}

# calibre_web_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
# To add your own custom labels, use `calibre_web_container_labels_additional_labels_custom`
#
# Example:
# calibre_web_container_labels_additional_labels_custom:
#   - my.label=1
#   - another.label="here"
calibre_web_container_labels_additional_labels: "{{ calibre_web_container_labels_additional_labels_auto + calibre_web_container_labels_additional_labels_custom }}"
calibre_web_container_labels_additional_labels_auto: []
calibre_web_container_labels_additional_labels_custom: []

# A list of extra arguments to pass to the container (`docker create` command)
calibre_web_container_extra_arguments: "{{ calibre_web_container_extra_arguments_auto + calibre_web_container_extra_arguments_custom }}"
calibre_web_container_extra_arguments_auto: []
calibre_web_container_extra_arguments_custom: []

# Specifies the value of the `X-XSS-Protection` header
# Stops pages from loading when they detect reflected cross-site scripting (XSS) attacks.
#
# Learn more about it is here:
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection
# - https://portswigger.net/web-security/cross-site-scripting/reflected
calibre_web_http_header_xss_protection: "1; mode=block"

# Specifies the value of the `X-Content-Type-Options` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
calibre_web_http_header_content_type_options: nosniff

# Specifies the value of the `Content-Security-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
calibre_web_http_header_content_security_policy: frame-ancestors 'self'

# Specifies the value of the `Permissions-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy
calibre_web_http_header_permissions_policy: "{{ 'interest-cohort=()' if calibre_web_floc_optout_enabled else '' }}"

# Specifies the value of the `Strict-Transport-Security` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
calibre_web_http_header_strict_transport_security: "max-age=31536000; includeSubDomains{{ '; preload' if calibre_web_hsts_preload_enabled else '' }}"

# Controls whether to send a "Permissions-Policy interest-cohort=();" header along with all responses
#
# Learn more about what it is here:
# - https://www.eff.org/deeplinks/2021/03/googles-floc-terrible-idea
# - https://paramdeo.com/blog/opting-your-website-out-of-googles-floc-network
# - https://amifloced.org/
#
# Of course, a better solution is to just stop using browsers (like Chrome), which participate in such tracking practices.
# See: `calibre_web_http_header_permissions_policy`
calibre_web_floc_optout_enabled: true

# Controls if HSTS preloading is enabled
#
# In its strongest and recommended form, the [HSTS policy](https://www.chromium.org/hsts) includes all subdomains, and
# indicates a willingness to be "preloaded" into browsers:
# `Strict-Transport-Security: max-age=31536000; includeSubDomains; preload`
# For more information visit:
# - https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
# - https://hstspreload.org/#opt-in
# See: `calibre_web_http_header_strict_transport_security`
calibre_web_hsts_preload_enabled: false

# List of systemd services that the Calibre-Web systemd service depends on
calibre_web_systemd_required_services_list: "{{ calibre_web_systemd_required_services_list_default + calibre_web_systemd_required_services_list_auto + calibre_web_systemd_required_services_list_custom }}"
calibre_web_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
calibre_web_systemd_required_services_list_auto: []
calibre_web_systemd_required_services_list_custom: []

# List of systemd services that the Calibre-Web systemd service wants
calibre_web_systemd_wanted_services_list: "{{ calibre_web_systemd_wanted_services_list_default + calibre_web_systemd_wanted_services_list_auto + calibre_web_systemd_wanted_services_list_custom }}"
calibre_web_systemd_wanted_services_list_default: []
calibre_web_systemd_wanted_services_list_auto: []
calibre_web_systemd_wanted_services_list_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
calibre_web_container_stop_grace_time_seconds: "{{ devture_systemd_docker_base_container_stop_grace_time_seconds }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
calibre_web_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
calibre_web_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
calibre_web_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ calibre_web_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ calibre_web_container_stop_grace_time_seconds }} {{ calibre_web_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ calibre_web_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ calibre_web_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ calibre_web_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ calibre_web_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ calibre_web_identifier }} after {{ calibre_web_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

# Specify the timezone
calibre_web_environment_variables_tz: Etc/UTC

# Controls the `cw_booksfolder` environment variable
calibre_web_environment_variables_cw_booksfolder: /books

# Control if Google OAUTH is allowed to work
calibre_web_environment_variables_oauth_enabled: false

# Control if the ability to perform ebook conversion is added
calibre_web_environment_variables_conversion_ability_enabled: false

# Additional environment variables to pass to the Calibre-Web container.
# You can use this to further influence the default configuration.
# Check https://github.com/linuxserver/docker-calibre-web to enable Calibre E-Book Converter
#
# Example:
# calibre_web_environment_variables_additional_variables: |
#   DOCKER_MODS=linuxserver/mods:universal-calibre
calibre_web_environment_variables_additional_variables: ""

# calibre_web_restart_necessary controls whether the Calibre-Web systemd
# service will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed" — appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
calibre_web_restart_necessary: false
